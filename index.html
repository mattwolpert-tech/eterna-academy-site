<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Eterna Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/styles.css">
<style>
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;z-index:100}
  #gate .box{background:var(--green);border-radius:18px;padding:40px 34px;width:340px;text-align:center;box-shadow:0 12px 44px rgba(26,60,52,.22)}
  #gate .box img{height:34px;width:auto;display:block;margin:0 auto 6px}
  #gate .acad{color:var(--gold-bright);font-size:12px;letter-spacing:.22em;font-weight:600;margin-bottom:18px}
  #gate p{color:rgba(255,255,255,.75);font-size:13px;margin:0 0 20px}
  #gate input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font:inherit;margin-bottom:12px}
  #gate input::placeholder{color:rgba(255,255,255,.5)}
  #gate button{width:100%;padding:12px;border:0;border-radius:10px;background:var(--gold-bright);color:var(--green);font-weight:600;font:inherit;cursor:pointer}
  #gate button:hover{filter:brightness(1.05)}
  #gate .err{color:#ffb4ab;font-size:13px;margin-bottom:10px;display:none}
</style>
</head>
<body>
<div id="gate">
  <form class="box" id="gateForm">
    <img src="assets/eterna-logo-white.png" alt="Eterna">
    <div class="acad">ACADEMY</div>
    <p>Enter your access password</p>
    <div class="err" id="gateErr">Incorrect password</div>
    <input type="password" id="gatePw" placeholder="Password" autocomplete="current-password" autofocus>
    <button type="submit" id="gateBtn">Unlock</button>
  </form>
</div>

<div class="app" id="app" style="display:none">
  <aside class="side">
    <div class="brand"><img src="assets/eterna-logo-white.png" alt="Eterna"><span style="color:var(--gold-bright);font-size:10px;letter-spacing:.18em;font-weight:600;align-self:flex-end;padding-bottom:3px">ACADEMY</span></div>
    <button class="nav" data-go="dashboard"><i class="ti ti-home"></i> <span>Dashboard</span></button>
    <button class="nav" data-go="curriculum"><i class="ti ti-map-2"></i> <span>Curriculum</span></button>
    <button class="nav" data-go="arena"><i class="ti ti-microphone-2"></i> <span>Roleplay arena</span></button>
    <button class="nav" data-go="quiz"><i class="ti ti-help-circle"></i> <span>Quiz bank</span></button>
    <button class="nav" data-go="videolib"><i class="ti ti-player-play"></i> <span>Video library</span></button>
    <button class="nav" data-go="leaderboard"><i class="ti ti-trophy"></i> <span>Leaderboard</span></button>
    <button class="nav" data-go="badges"><i class="ti ti-award"></i> <span>Badges</span></button>
    <div class="spacer"></div>
    <button class="nav" data-go="switch"><i class="ti ti-arrows-left-right"></i> <span>Switch track</span></button>
    <button class="nav" data-go="reset"><i class="ti ti-refresh"></i> <span>Reset progress</span></button>
    <div class="foot" id="foot"></div>
  </aside>
  <main class="main">
    <div class="top">
      <div style="color:var(--txt2);font-size:13px"><i class="ti ti-flame" style="color:var(--warn);vertical-align:-2px"></i> <span id="streak">1</span>-day streak</div>
      <div class="chips">
        <span class="chip"><i class="ti ti-coin" style="color:var(--warn)"></i> <span id="coins">0</span></span>
        <span class="lvl" id="levelpill">Level 1</span>
        <div class="xpmini"><i id="xpbar" style="width:0%"></i></div>
        <div class="av" id="avatar">A</div>
      </div>
    </div>
    <div class="wrap" id="view"></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script src="js/data.enc.js"></script>
<script src="js/gate.js"></script>
</body>
</html>
