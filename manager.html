<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Eterna Academy — Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
  :root{--green:#1a3c34;--green2:#2d6a56;--gold:#b88a1e;--goldb:#f5c842;--bg:#f6f3ec;--panel:#fff;--line:rgba(26,60,52,.14);--txt:#1b2a25;--txt2:#5a6672;--bad:#c0392b}
  *{box-sizing:border-box}body{margin:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
  h1,h2,h3{font-family:'Playfair Display',serif;color:var(--green);margin:0 0 6px}
  a{color:var(--green2)}
  .top{background:var(--green);color:#fff;padding:12px 22px;display:flex;align-items:center;justify-content:space-between}
  .top img{height:26px}.top .who{font-size:13px;color:rgba(255,255,255,.75)}
  .tabs{display:flex;gap:4px;padding:10px 22px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{padding:9px 15px;border:none;background:none;font:inherit;color:var(--txt2);cursor:pointer;border-radius:8px 8px 0 0}
  .tab.on{background:var(--panel);color:var(--green);font-weight:600;border:1px solid var(--line);border-bottom:1px solid var(--panel);margin-bottom:-1px}
  .wrap{max-width:1050px;margin:0 auto;padding:22px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 14px;font:inherit;font-weight:500;cursor:pointer}
  .btn:hover{background:#143029}.btn.s{padding:4px 9px;font-size:13px}.btn.gold{background:var(--goldb);color:var(--green)}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--green)}.btn.danger{background:none;border:1px solid var(--bad);color:var(--bad)}
  input,select,textarea{font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--txt);width:100%}
  textarea{min-height:120px;line-height:1.5;font-family:inherit}
  label{font-size:12px;color:var(--txt2);display:block;margin:8px 0 3px}
  table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}th{color:var(--txt2);font-weight:600}
  .row{display:flex;gap:10px;align-items:center}
  .mod{border:1px solid var(--line);border-radius:10px;margin-bottom:10px}
  .modh{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f0f4f1;border-radius:10px 10px 0 0}
  .les{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--line)}
  .les .lt{flex:1}.pill{font-size:11px;background:#eaf2ed;color:var(--green2);padding:2px 7px;border-radius:5px}
  .muted{color:var(--txt2);font-size:13px}
  .ok{color:var(--green2)}.err{color:var(--bad)}
  #login{max-width:340px;margin:12vh auto;text-align:center}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 18px;border-radius:9px;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1}
  .screen{display:none}.screen.on{display:block}
  .typecard{display:inline-flex;flex-direction:column;align-items:center;gap:3px;padding:8px 14px;border:1px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;color:var(--txt2);min-width:78px;font-size:12px}
  .typecard.on{border-color:var(--green2);background:#eef4f1;color:var(--green);font-weight:600}
  .typecard i{font-size:18px}
  .mdbar{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
  .mdbar button{padding:5px 9px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;font-size:12px;color:var(--green)}
  .mdbar button:hover{background:#eef4f1}
  .preview{border:1px solid var(--line);border-radius:8px;padding:10px 14px;background:#fbfbf9;font-size:13px;line-height:1.5}
  .preview h2{font-size:17px;border:none;padding:0;margin:8px 0 4px}.preview h3{font-size:14px;margin:8px 0 3px}
  .preview table{font-size:12px}.preview img{max-width:100%;border-radius:8px}.preview code{background:#eef2f0;padding:1px 5px;border-radius:4px}
  .picklist{max-height:260px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:6px;background:#fff}
  .pickitem{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:6px;cursor:pointer}.pickitem:hover{background:#f0f4f1}
  .mod.collapsed .les{display:none}
  .modh i{color:var(--green2)}
  .les .lt:hover{color:var(--green2);text-decoration:underline}
</style>
</head>
<body>
<div id="login" class="card">
  <h2>Manager sign-in</h2>
  <p class="muted">Enter your manager admin key.</p>
  <input type="password" id="akey" placeholder="AcadAdmin-..." autofocus style="margin-bottom:10px">
  <button class="btn" style="width:100%" onclick="login()">Sign in</button>
  <p id="loginerr" class="err" style="display:none;margin-top:8px">Invalid key</p>
</div>

<div id="appwrap" style="display:none">
  <div class="top">
    <div class="row"><img src="assets/eterna-logo-white.png" alt="Eterna"><span style="color:var(--goldb);font-size:11px;letter-spacing:.16em;font-weight:600">MANAGER</span></div>
    <div class="row"><span class="who" id="who"></span><button class="btn ghost s" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="logout()">Sign out</button></div>
  </div>
  <div class="tabs">
    <button class="tab on" data-t="agents" onclick="tab('agents')">Agents</button>
    <button class="tab" data-t="orientation" onclick="tab('orientation')">Orientation</button>
    <button class="tab" data-t="curriculum" onclick="tab('curriculum')">Curriculum</button>
    <button class="tab" data-t="videos" onclick="tab('videos')">Videos</button>
    <button class="tab" data-t="quizzes" onclick="tab('quizzes')">Quizzes</button>
    <button class="tab" data-t="roleplay" onclick="tab('roleplay')">Roleplay</button>
  </div>
  <div class="wrap">
    <div class="screen on" id="s-agents"></div>
    <div class="screen" id="s-orientation"></div>
    <div class="screen" id="s-curriculum"></div>
    <div class="screen" id="s-videos"></div>
    <div class="screen" id="s-quizzes"></div>
    <div class="screen" id="s-roleplay"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var API = "https://eterna-academy-progress.matt-wolpert.workers.dev";
var KEY = sessionStorage.getItem("ea_admin") || "";
var DATA = null;

function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},1800);}
function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

async function api(path, opts){ opts=opts||{}; opts.headers=Object.assign({"X-Admin-Key":KEY},opts.headers||{}); return fetch(API+path,opts); }

async function login(){
  KEY=document.getElementById("akey").value.trim();
  var r=await api("/admin");
  if(!r.ok){document.getElementById("loginerr").style.display="block";return;}
  sessionStorage.setItem("ea_admin",KEY);
  start();
}
function logout(){sessionStorage.removeItem("ea_admin");location.reload();}
if(KEY){ api("/admin").then(function(r){ if(r.ok) start(); }); }

async function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("appwrap").style.display="block";
  document.getElementById("who").textContent="Signed in";
  var r=await fetch(API+"/content?key="+encodeURIComponent(KEY));
  DATA=await r.json();
  renderAgents(); renderOrientation(); renderCurriculum(); renderVideos(); renderQuizzes(); renderRoleplay();
}
function tab(t){document.querySelectorAll(".tab").forEach(function(b){b.classList.toggle("on",b.dataset.t===t)});document.querySelectorAll(".screen").forEach(function(s){s.classList.toggle("on",s.id==="s-"+t)});}

// ---------- AGENTS ----------
async function renderAgents(){
  var el=document.getElementById("s-agents");
  el.innerHTML='<h2>Agent progress</h2><p class="muted">Live completion across the floor.</p><div class="card" id="agtbl">Loading…</div>';
  var r=await api("/admin"); var d=await r.json();
  var a=(d.agents||[]).slice().sort(function(x,y){return y.xp-x.xp});
  if(!a.length){document.getElementById("agtbl").innerHTML='<p class="muted">No agents have signed in yet.</p>';return;}
  var tot={};(DATA.tracks||[]).forEach(function(t){var n=0;t.modules.forEach(function(m){n+=m.lessons.length;});tot[t.id]=n;});
  var rows=a.map(function(x,i){
    var total=tot[x.track]||0,pct=total?Math.min(100,Math.round((x.lessons||0)/total*100)):0;
    var bar='<div style="height:5px;background:#e7e2d6;border-radius:3px;width:84px;margin-top:3px"><div style="height:5px;background:#2d6a56;border-radius:3px;width:'+pct+'%"></div></div>';
    var pcell='<td><b>'+pct+'%</b>'+bar+'<div class="muted" style="font-size:11px">'+(x.lessons||0)+(total?' / '+total:'')+' pages</div></td>';
    return '<tr><td>'+(i+1)+'</td><td>'+esc(x.name)+'<div class="muted">'+esc(x.email)+(x.number?' · '+esc(x.number):'')+'</div></td><td>'+esc(x.program||"-")+'</td><td>'+esc(x.upline||"-")+'</td><td><span class="pill">'+esc(x.track||"-")+'</span></td>'+pcell+'<td>Lv '+(x.level+1)+'</td><td><b>'+(x.xp||0).toLocaleString()+'</b></td><td>'+(x.badges||0)+'</td><td>'+((x.certs||[]).length)+'</td><td class="muted">'+(x.updated?new Date(x.updated).toLocaleDateString():"-")+'</td><td><button class="btn ghost s" onclick="resetPw(\''+esc(x.email)+'\')">Reset pw</button></td></tr>';
  }).join("");
  document.getElementById("agtbl").innerHTML='<table><thead><tr><th>#</th><th>Agent</th><th>Program</th><th>Upline</th><th>Track</th><th>% Complete</th><th>Level</th><th>XP</th><th>Badges</th><th>Certs</th><th>Last active</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}

async function resetPw(email){
  var np=prompt("Set a new temporary password for "+email+".\nGive it to the agent — they can sign in with it, then change it themselves via “Forgot password”.");
  if(np===null)return; np=(np||"").trim();
  if(np.length<4){toast("Password must be at least 4 characters");return;}
  var r=await api("/reset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email,password:np})});
  var d=await r.json().catch(function(){return{};});
  if(r.ok&&d.ok)toast("Password reset for "+email); else toast(d.error||"Reset failed");
}
// ---------- ORIENTATION ----------
var CARRIERS=["Mutual of Omaha","Foresters","Corebridge","American Amicable","Transamerica","Ethos","Fidelity"];
async function renderOrientation(){
  var el=document.getElementById("s-orientation");
  el.innerHTML='<h2>Inbound Orientation</h2><p class="muted">Carrier contracts, tool sign-ins, and exam certification per agent.</p><div class="card" id="ormissing"></div><div class="card" id="ortbl">Loading…</div>';
  var r=await api("/admin"); var d=await r.json(); var agents=(d.agents||[]); window._orientAgents=agents;
  function cell(a,name){var s=((a.orientation||{}).items||{})[name];if(!s)return '<td class="muted">—</td>';if(s.status==="uploaded")return '<td><a href="#" class="ok" onclick="viewUpload(\''+esc(a.email)+'\',\''+esc(s.slug||"")+'\',\''+esc(name)+'\');return false">✓ view</a></td>';return '<td class="err">✗ none</td>';}
  var head='<tr><th>Agent</th>'+CARRIERS.map(function(c){return '<th title="'+c+'">'+c.split(" ").map(function(w){return w[0]}).join("")+'</th>'}).join("")+'<th>Toolkits</th><th>Dialpad</th><th>Exam (80%)</th><th>Expectations signed</th></tr>';
  var rows=agents.map(function(a){var o=a.orientation||{};var exam=o.exam?(o.exam.passed?'<span class="ok">✓ '+o.exam.score+'%</span>':'<span class="err">'+o.exam.score+'%</span>'):'<span class="muted">—</span>';var ack=(o.ack&&o.ack.agreed)?'<a href="#" class="ok" onclick="viewAck(\''+esc(a.email)+'\');return false">✓ '+esc(o.ack.date||"signed")+'</a>':'<span class="err">✗ none</span>';return '<tr><td>'+esc(a.name)+'<div class="muted">'+esc(a.email)+'</div></td>'+CARRIERS.map(function(c){return cell(a,c)}).join("")+cell(a,"Insurance Toolkits")+cell(a,"Dialpad")+'<td>'+exam+'</td><td>'+ack+'</td></tr>';}).join("");
  document.getElementById("ortbl").innerHTML=agents.length?'<table><thead>'+head+'</thead><tbody>'+rows+'</tbody></table>':'<p class="muted">No agents have started orientation yet.</p>';
  var missing={};agents.forEach(function(a){var items=(a.orientation||{}).items||{};CARRIERS.forEach(function(c){if(items[c]&&items[c].status==="dont_have"){(missing[c]=missing[c]||[]).push(a.name);}});});
  var mk=Object.keys(missing);
  document.getElementById("ormissing").innerHTML='<h3 style="margin-top:0"><i class="ti ti-alert-triangle" style="color:#b88a1e;vertical-align:-2px"></i> Missing carrier contracts</h3>'+(mk.length?mk.map(function(c){return '<div style="margin:6px 0;padding:8px 10px;background:#faf2d6;border-radius:8px"><b>'+esc(c)+'</b> — '+missing[c].map(esc).join(", ")+'</div>';}).join(""):'<p class="muted">No agent has reported a missing contract.</p>');
}
async function viewUpload(email,slug,name){
  var r=await api("/upload?email="+encodeURIComponent(email)+"&slug="+encodeURIComponent(slug));
  var dataURL=(await r.text()).trim();
  if(!dataURL){toast("No image found");return;}
  var w=window.open("","_blank");
  if(w)w.document.write('<title>'+esc(name)+' — '+esc(email)+'</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="'+dataURL+'" style="max-width:100%;max-height:100vh"></body>');
}
function viewAck(email){
  var a=(window._orientAgents||[]).find(function(x){return x.email===email;});
  if(!a||!a.orientation||!a.orientation.ack||!a.orientation.ack.agreed){toast("No signature on file");return;}
  var k=a.orientation.ack;var w=window.open("","_blank");if(!w)return;
  w.document.write('<!doctype html><meta charset="utf-8"><title>Acknowledgment — '+esc(a.name)+'</title>'
    +'<style>body{font-family:DM Sans,Segoe UI,sans-serif;color:#22302c;max-width:720px;margin:40px auto;padding:0 26px;line-height:1.6}'
    +'h1{font-family:Playfair Display,Georgia,serif;color:#1a3c34;margin:0}h2{font-family:Playfair Display,Georgia,serif;color:#2d6a56}'
    +'.rule{height:3px;width:64px;background:#f5c842;margin:8px 0 20px}'
    +'.box{border:1px solid #e2dccd;background:#f6f3ec;border-radius:10px;padding:16px 20px;margin:18px 0}'
    +'.sig{font-family:Playfair Display,Georgia,serif;font-size:30px;color:#1a3c34;border-bottom:2px solid #1a3c34;display:inline-block;padding:0 26px 4px;margin-top:6px}'
    +'.meta{color:#5a6672;font-size:13px}'
    +'.btn{background:#1a3c34;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer}@media print{.btn{display:none}}</style>'
    +'<h1>ETERNA</h1><div class="rule"></div><h2>Inbound Program — Expectations Acknowledgment</h2>'
    +'<div class="box">I, <b>'+esc(k.name)+'</b>, confirm that I have read and understand the Eterna Inbound Program expectations — including the performance standards, daily presence in the &ldquo;inbound&rdquo; Discord (camera on, off mute), the call-allocation and accountability terms, and the professionalism &amp; compliance standards — and I agree to abide by them.</div>'
    +'<p class="meta">Agent: '+esc(a.name)+' &middot; '+esc(a.email)+(a.upline?' &middot; Upline: '+esc(a.upline):'')+(a.program?' &middot; '+esc(a.program):'')+'</p>'
    +'<p style="margin-top:30px;margin-bottom:0">Signature</p><div class="sig">'+esc(k.name)+'</div>'
    +'<p class="meta" style="margin-top:14px">Date signed: <b>'+esc(k.date||"")+'</b>'+(k.ts?' &middot; Recorded '+new Date(k.ts).toLocaleString():'')+'</p>'
    +'<p style="margin-top:26px"><button class="btn" onclick="window.print()">Print / Save as PDF</button></p>'
    +'<p class="meta" style="margin-top:34px;border-top:1px solid #ddd;padding-top:8px">Confidential — Eterna Insurance Solutions.</p>');
  w.document.close();
}

// ---------- CURRICULUM ----------
function renderCurriculum(){
  var el=document.getElementById("s-curriculum");
  window._collapsed=window._collapsed||{};
  var h='<div class="row" style="justify-content:space-between"><h2>Curriculum builder</h2><button class="btn" onclick="saveStructure()">Save & publish</button></div><p class="muted">Build <b>tracks → modules → lessons</b>. Click a lesson to edit it. Use the ▾ arrow to collapse a module. Remember to <b>Save & publish</b> when done.</p>';
  DATA.tracks.forEach(function(t,ti){
    var lcount=t.modules.reduce(function(n,m){return n+m.lessons.length;},0);
    h+='<div class="card"><h3 style="margin:0 0 8px">'+esc(t.title)+' <span class="muted" style="font-size:12px;font-weight:400">'+t.modules.length+' modules · '+lcount+' lessons</span></h3>';
    t.modules.forEach(function(m,mi){
      var ck=t.id+"_"+m.id, coll=window._collapsed[ck];
      h+='<div class="mod'+(coll?" collapsed":"")+'"><div class="modh"><button class="btn ghost s" style="border:none;padding:1px 6px;font-size:14px" title="Collapse" onclick="toggleMod(\''+ck+'\')">'+(coll?"▸":"▾")+'</button><i class="ti '+esc(m.icon||"ti-folder")+'"></i><input value="'+esc(m.title)+'" onchange="setMod('+ti+','+mi+',\'title\',this.value)" style="flex:1;font-weight:600"><span class="muted" style="font-size:11px">'+m.lessons.length+'</span><button class="btn ghost s" title="Module icon" onclick="pickIcon('+ti+','+mi+')">icon</button><button class="btn ghost s" onclick="moveMod('+ti+','+mi+',-1)">↑</button><button class="btn ghost s" onclick="moveMod('+ti+','+mi+',1)">↓</button><button class="btn danger s" onclick="delMod('+ti+','+mi+')">Delete</button></div>';
      m.lessons.forEach(function(l,li){
        var label=l.title||(l.doc?(DATA.docs[l.doc]&&DATA.docs[l.doc].t)||l.doc:l.id);
        h+='<div class="les"><span class="pill">'+esc(l.type)+'</span><span class="lt" style="flex:1;cursor:pointer" onclick="editLesson('+ti+','+mi+','+li+')">'+esc(label)+'</span><span class="muted" style="font-size:11px">'+(l.xp||0)+' xp</span><button class="btn ghost s" onclick="editLesson('+ti+','+mi+','+li+')">Edit</button><button class="btn ghost s" onclick="moveLes('+ti+','+mi+','+li+',-1)">↑</button><button class="btn ghost s" onclick="moveLes('+ti+','+mi+','+li+',1)">↓</button><button class="btn danger s" onclick="delLes('+ti+','+mi+','+li+')">✕</button></div>';
      });
      h+='<div class="les"><button class="btn ghost s" onclick="addLes('+ti+','+mi+')">+ Add lesson</button></div></div>';
    });
    h+='<button class="btn ghost s" onclick="addMod('+ti+')">+ Add module</button></div>';
  });
  h+='<div id="lessonEdit"></div>';
  el.innerHTML=h;
}
function toggleMod(k){window._collapsed[k]=!window._collapsed[k];renderCurriculum();}
function pickIcon(ti,mi){var cur=DATA.tracks[ti].modules[mi].icon||"ti-folder";var v=prompt("Module icon — any Tabler icon name (browse them at tabler-icons.io).\nExamples: ti-flag, ti-trophy, ti-sparkles, ti-building-bank, ti-script, ti-phone, ti-headset, ti-coin, ti-brain",cur);if(v){DATA.tracks[ti].modules[mi].icon=v.trim();renderCurriculum();}}
function setMod(ti,mi,k,v){DATA.tracks[ti].modules[mi][k]=v;}
function setLes(ti,mi,li,k,v){DATA.tracks[ti].modules[mi].lessons[li][k]=v;}
function moveMod(ti,mi,d){var a=DATA.tracks[ti].modules;var ni=mi+d;if(ni<0||ni>=a.length)return;var x=a.splice(mi,1)[0];a.splice(ni,0,x);renderCurriculum();}
function moveLes(ti,mi,li,d){var a=DATA.tracks[ti].modules[mi].lessons;var ni=li+d;if(ni<0||ni>=a.length)return;var x=a.splice(li,1)[0];a.splice(ni,0,x);renderCurriculum();}
function delMod(ti,mi){if(confirm("Delete this whole module and its lessons?")){DATA.tracks[ti].modules.splice(mi,1);renderCurriculum();}}
function delLes(ti,mi,li){if(confirm("Delete this lesson?")){DATA.tracks[ti].modules[mi].lessons.splice(li,1);renderCurriculum();}}
function addMod(ti){var id="m"+Date.now();DATA.tracks[ti].modules.push({id:id,title:"New module",icon:"ti-folder",summary:"",lessons:[]});renderCurriculum();}
function addLes(ti,mi){var id="l"+Date.now();DATA.tracks[ti].modules[mi].lessons.push({id:id,type:"reading",title:"New lesson",xp:30,body:""});var li=DATA.tracks[ti].modules[mi].lessons.length-1;renderCurriculum();editLesson(ti,mi,li);}

async function editLesson(ti,mi,li){
  var l=DATA.tracks[ti].modules[mi].lessons[li];
  var box=document.getElementById("lessonEdit");
  var body="";
  if(l.type==="doc"&&l.doc){ var r=await fetch(API+"/body?id="+encodeURIComponent(l.doc)+"&key="+encodeURIComponent(KEY)); body=await r.text(); }
  else body=l.body||"";
  l._body=body;
  window._le={ti:ti,mi:mi,li:li,l:l};
  var types=[["reading","Reading","ti-file-text"],["video","Video","ti-player-play"],["quiz","Quiz","ti-help-circle"],["roleplay","Roleplay","ti-microphone-2"],["doc","Document","ti-file"],["library","Library","ti-folder"]];
  box.innerHTML='<div class="card" style="border:2px solid var(--green2)"><div class="row" style="justify-content:space-between"><h3 style="margin:0">Edit lesson</h3><button class="btn ghost s" onclick="closeEdit()">Close</button></div>'
    +'<label>Title</label><input id="le_title" value="'+esc(l.title||"")+'">'
    +'<label>What kind of lesson is this?</label><div class="row" style="flex-wrap:wrap;gap:6px" id="le_typecards">'+types.map(function(t){return '<button class="typecard'+(l.type===t[0]?" on":"")+'" data-ty="'+t[0]+'" onclick="setType(\''+t[0]+'\')"><i class="ti '+t[2]+'"></i>'+t[1]+'</button>';}).join("")+'</div>'
    +'<label>Points (XP)</label><input id="le_xp" type="number" value="'+(l.xp||0)+'" style="max-width:120px">'
    +'<div id="le_typedefs"></div>'
    +'<div class="row" style="margin-top:14px"><button class="btn" onclick="saveLesson()">Save lesson</button><button class="btn ghost" onclick="closeEdit()">Cancel</button></div></div>';
  leTypeDefs();
  box.scrollIntoView({behavior:"smooth"});
}
function closeEdit(){document.getElementById("lessonEdit").innerHTML="";}
function setType(t){window._le.l.type=t;document.querySelectorAll("#le_typecards .typecard").forEach(function(b){b.classList.toggle("on",b.dataset.ty===t);});leTypeDefs();}
function leTypeDefs(){
  var l=window._le.l;var t=l.type;var d=document.getElementById("le_typedefs");var h="";
  if(t==="reading"||t==="doc"){
    if(t==="doc")h+='<label>Document id (reusable across lessons, e.g. d077)</label><input id="le_doc" value="'+esc(l.doc||"")+'">';
    h+='<label>Content — use the buttons, no code needed</label>'
      +'<div class="mdbar">'
      +'<button onclick="mdIns(\'## \',\'\',\'Heading\')" title="Big heading">H2</button>'
      +'<button onclick="mdIns(\'### \',\'\',\'Subheading\')" title="Smaller heading">H3</button>'
      +'<button onclick="mdIns(\'**\',\'**\',\'bold text\')"><b>B</b></button>'
      +'<button onclick="mdIns(\'\\n- \',\'\',\'list item\')">&bull; List</button>'
      +'<button onclick="mdIns(\'\\n1. \',\'\',\'first item\')">1. List</button>'
      +'<button onclick="mdIns(\'[\',\'](https://)\',\'link text\')">&#128279; Link</button>'
      +'<button onclick="mdIns(\'\\n![\',\'](/assets/image.png)\',\'caption\')">&#128247; Image</button>'
      +'<button onclick="insTable()">&#9638; Table</button>'
      +'<button onclick="uploadImage()" title="Upload a photo or screenshot">&#128247; Upload image</button>'
      +'</div>'
      +'<textarea id="le_body" style="min-height:200px" oninput="mdPreview()" placeholder="Write the lesson here. Highlight text and click a button to format it.">'+esc(l._body||l.body||"")+'</textarea>'
      +'<label>Live preview — exactly what agents see</label><div class="preview" id="le_preview"></div>';
  }
  if(t==="video"){
    h+='<label>Paste a Google Drive or YouTube link (we grab the id automatically)</label><input id="le_videolink" value="'+esc(l.video||"")+'" oninput="document.getElementById(\'le_video\').value=vidId(this.value)" placeholder="https://drive.google.com/file/d/... or https://youtube.com/watch?v=...">'
      +'<label>Video id</label><input id="le_video" value="'+esc(l.video||"")+'">'
      +'<label>Intro text above the video (optional)</label><textarea id="le_body" style="min-height:70px">'+esc(l._body||l.body||"")+'</textarea>';
  }
  if(t==="quiz"){
    h+='<label>Pick the questions for this lesson ('+DATA.quizzes.length+' available)</label><div class="picklist" id="le_quizpick">'+pickQuiz(l.quizzes||[])+'</div><p class="muted" style="font-size:11px">Build new questions in the <b>Quizzes</b> tab.</p>';
  }
  if(t==="roleplay"){
    h+='<label>Pick the scenarios for this lesson ('+DATA.roleplay.length+' available)</label><div class="picklist" id="le_rppick">'+pickRp(l.roleplay||[])+'</div><p class="muted" style="font-size:11px">Build new scenarios in the <b>Roleplay</b> tab.</p>';
  }
  if(t==="library")h+='<p class="muted">This lesson automatically shows the track\'s whole video library — no settings needed.</p>';
  d.innerHTML=h;
  if(t==="reading"||t==="doc")mdPreview();
}
function pickQuiz(sel){return DATA.quizzes.map(function(q){var on=sel.indexOf(q.id)>=0;return '<label class="pickitem"><input type="checkbox" style="width:auto" value="'+esc(q.id)+'" '+(on?"checked":"")+'><span class="muted" style="font-size:10px;min-width:78px">'+esc(q.id)+'</span><span style="font-size:12px">'+esc((q.q||"(no text)").slice(0,72))+'</span></label>';}).join("")||'<p class="muted">No questions yet — build them in the Quizzes tab.</p>';}
function pickRp(sel){return DATA.roleplay.map(function(s){var on=sel.indexOf(s.id)>=0;return '<label class="pickitem"><input type="checkbox" style="width:auto" value="'+esc(s.id)+'" '+(on?"checked":"")+'><span class="muted" style="font-size:10px;min-width:78px">'+esc(s.id)+'</span><span style="font-size:12px">'+esc((s.client||"(no text)").slice(0,72))+'</span></label>';}).join("")||'<p class="muted">No scenarios yet — build them in the Roleplay tab.</p>';}
function insTable(){mdIns("\n| Column A | Column B |\n| --- | --- |\n| value | value |\n","","");}
function vidId(s){s=(s||"").trim();var m=s.match(/[?&]v=([A-Za-z0-9_-]{11})/);if(m)return m[1];m=s.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);if(m)return m[1];m=s.match(/\/d\/([A-Za-z0-9_-]+)/);if(m)return m[1];m=s.match(/[?&]id=([A-Za-z0-9_-]+)/);if(m)return m[1];return s;}
function mdIns(before,after,ph){var ta=document.getElementById("le_body");if(!ta)return;var s=ta.selectionStart,e=ta.selectionEnd,v=ta.value;var sel=v.slice(s,e)||ph||"";ta.value=v.slice(0,s)+before+sel+after+v.slice(e);ta.focus();ta.selectionStart=s+before.length;ta.selectionEnd=s+before.length+sel.length;mdPreview();}
function mdPreview(){var ta=document.getElementById("le_body"),pv=document.getElementById("le_preview");if(ta&&pv)pv.innerHTML=mdRender(ta.value);}
function uploadImage(){
  var ta=document.getElementById("le_body");if(!ta)return;
  var inp=document.createElement("input");inp.type="file";inp.accept="image/*";
  inp.onchange=function(){
    var f=inp.files[0];if(!f)return;toast("Adding image…");
    var rd=new FileReader();
    rd.onload=function(){
      var img=new Image();
      img.onload=function(){
        var max=900,w=img.width,hh=img.height;
        if(w>max){hh=Math.round(hh*max/w);w=max;}
        var cv=document.createElement("canvas");cv.width=w;cv.height=hh;
        cv.getContext("2d").drawImage(img,0,0,w,hh);
        var url=cv.toDataURL("image/jpeg",0.72);
        var cap=(f.name||"image").replace(/\.[^.]+$/,"");
        var ins="\n!["+cap+"]("+url+")\n";
        var s=ta.selectionStart||ta.value.length;
        ta.value=ta.value.slice(0,s)+ins+ta.value.slice(s);
        mdPreview();toast("Image added ("+Math.round(url.length/1024)+" KB) — Save to publish");
      };
      img.onerror=function(){toast("Could not read that image");};
      img.src=rd.result;
    };
    rd.readAsDataURL(f);
  };
  inp.click();
}
function mdRender(src){var lines=(src||"").split("\n"),out=[],i=0;function inl(s){return esc(s).replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>");}
  while(i<lines.length){var ln=lines[i];
    if(/^### /.test(ln)){out.push("<h3>"+inl(ln.slice(4))+"</h3>");i++;continue;}
    if(/^## /.test(ln)){out.push("<h2>"+inl(ln.slice(3))+"</h2>");i++;continue;}
    if(/^# /.test(ln)){out.push("<h2>"+inl(ln.slice(2))+"</h2>");i++;continue;}
    if(/^\s*!\[[^\]]*\]\([^)]+\)\s*$/.test(ln)){var im=ln.match(/!\[([^\]]*)\]\(([^)]+)\)/);out.push('<img src="'+im[2]+'" alt="'+esc(im[1])+'">');i++;continue;}
    if(/^\s*\|.*\|/.test(ln)){var rows=[];while(i<lines.length&&/^\s*\|.*\|/.test(lines[i])){rows.push(lines[i]);i++;}var cs=rows.map(function(r){return r.trim().replace(/^\||\|$/g,"").split("|").map(function(c){return c.trim();});});var sep=cs[1]&&cs[1].every(function(c){return /^:?-+:?$/.test(c);});var b=cs.slice(sep?2:1);var tb="<table><thead><tr>"+cs[0].map(function(c){return "<th>"+inl(c)+"</th>";}).join("")+"</tr></thead><tbody>";b.forEach(function(r){tb+="<tr>"+r.map(function(c){return "<td>"+inl(c)+"</td>";}).join("")+"</tr>";});out.push(tb+"</tbody></table>");continue;}
    if(/^\s*[-*] /.test(ln)){var it=[];while(i<lines.length&&/^\s*[-*] /.test(lines[i])){it.push("<li>"+inl(lines[i].replace(/^\s*[-*] /,""))+"</li>");i++;}out.push("<ul>"+it.join("")+"</ul>");continue;}
    if(/^\s*\d+\. /.test(ln)){var ol=[];while(i<lines.length&&/^\s*\d+\. /.test(lines[i])){ol.push("<li>"+inl(lines[i].replace(/^\s*\d+\. /,""))+"</li>");i++;}out.push("<ol>"+ol.join("")+"</ol>");continue;}
    if(ln.trim()===""){i++;continue;}
    var p=[ln];i++;while(i<lines.length&&lines[i].trim()!==""&&!/^(#{1,3} |\s*[-*] |\s*\d+\. |\s*\|)/.test(lines[i])){p.push(lines[i]);i++;}out.push("<p>"+inl(p.join(" "))+"</p>");
  }return out.join("");}
async function saveLesson(){
  var c=window._le,l=DATA.tracks[c.ti].modules[c.mi].lessons[c.li];
  l.title=document.getElementById("le_title").value;
  l.xp=+document.getElementById("le_xp").value||0;
  var t=l.type;
  ["video","doc","quizzes","roleplay","body","_body"].forEach(function(k){delete l[k];});
  if(t==="reading"){var b=document.getElementById("le_body").value;if(b)l.body=b;}
  else if(t==="doc"){l.doc=(document.getElementById("le_doc").value||"").trim();var bd=document.getElementById("le_body").value;if(l.doc)await api("/savebody",{method:"POST",body:JSON.stringify({id:l.doc,text:bd})});}
  else if(t==="video"){l.video=(document.getElementById("le_video").value||"").trim();var iv=document.getElementById("le_body");if(iv&&iv.value)l.body=iv.value;}
  else if(t==="quiz"){l.quizzes=[].slice.call(document.querySelectorAll("#le_quizpick input:checked")).map(function(c){return c.value;});}
  else if(t==="roleplay"){l.roleplay=[].slice.call(document.querySelectorAll("#le_rppick input:checked")).map(function(c){return c.value;});}
  await saveStructure(true);
  closeEdit();renderCurriculum();toast("Lesson saved & published");
}
async function saveStructure(quiet){
  var r=await api("/save",{method:"POST",body:JSON.stringify({what:"structure",value:{levels:DATA.levels,tracks:DATA.tracks}})});
  if(r.ok){ if(!quiet)toast("Curriculum published"); } else toast("Save failed");
}

// ---------- VIDEOS ----------
function renderVideos(){
  var el=document.getElementById("s-videos");
  var h='<div class="row" style="justify-content:space-between"><h2>Videos</h2><button class="btn" onclick="saveVideos()">Save & publish</button></div><p class="muted">Paste a Google Drive file id or YouTube id. Assign a track; it shows in that track\'s video library.</p>';
  h+='<div class="card"><table><thead><tr><th>Title</th><th>Drive/YouTube id</th><th>Track</th><th></th></tr></thead><tbody id="vbody"></tbody></table><button class="btn ghost s" style="margin-top:10px" onclick="addVid()">+ Add video</button></div>';
  el.innerHTML=h; vrows();
}
function vrows(){
  document.getElementById("vbody").innerHTML=DATA.videos.map(function(v,i){
    return '<tr><td><input value="'+esc(v.t)+'" onchange="DATA.videos['+i+'].t=this.value"></td><td><input value="'+esc(v.id)+'" onchange="DATA.videos['+i+'].id=this.value"></td><td><select onchange="DATA.videos['+i+'].track=this.value"><option '+(v.track==="new"?"selected":"")+'>new</option><option value="existing" '+(v.track==="existing"?"selected":"")+'>existing</option><option value="leader" '+(v.track==="leader"?"selected":"")+'>leader</option></select></td><td><button class="btn danger s" onclick="DATA.videos.splice('+i+',1);vrows()">✕</button></td></tr>';
  }).join("");
}
function addVid(){DATA.videos.push({t:"New video",id:"",track:"new"});vrows();}
async function saveVideos(){var r=await api("/save",{method:"POST",body:JSON.stringify({what:"videos",value:DATA.videos})});toast(r.ok?"Videos published":"Save failed");}

// ---------- QUIZZES (visual builder) ----------
function renderQuizzes(){
  var el=document.getElementById("s-quizzes");
  var h='<div class="row" style="justify-content:space-between"><h2>Quiz bank</h2><div class="row"><button class="btn ghost" onclick="addQuestion()">+ Add question</button><button class="btn" onclick="saveQuizzes()">Save & publish</button></div></div>'
    +'<p class="muted">'+DATA.quizzes.length+' questions. Type the question and answers, then click the circle to mark the correct one. Click <b>Save & publish</b> when done.</p>';
  DATA.quizzes.forEach(function(q,i){
    h+='<div class="card"><div class="row" style="justify-content:space-between;gap:8px">'
      +'<input style="max-width:180px" value="'+esc(q.topic)+'" placeholder="Topic" onchange="DATA.quizzes['+i+'].topic=this.value">'
      +'<div class="row"><span class="muted" style="font-size:11px">'+esc(q.id)+'</span><input type="number" style="width:62px" value="'+(q.xp||0)+'" title="XP" onchange="DATA.quizzes['+i+'].xp=+this.value||0"><button class="btn ghost s" title="Move up" onclick="moveQ('+i+',-1)">↑</button><button class="btn ghost s" title="Move down" onclick="moveQ('+i+',1)">↓</button><button class="btn danger s" title="Delete" onclick="delQ('+i+')">✕</button></div></div>'
      +'<label>Question</label><textarea style="min-height:48px" onchange="DATA.quizzes['+i+'].q=this.value" placeholder="What do you want to ask?">'+esc(q.q)+'</textarea>'
      +'<label>Answers — click the circle to mark the correct one</label>';
    (q.options||[]).forEach(function(o,oi){
      var on=q.answer===oi;
      h+='<div class="row" style="gap:8px;margin:5px 0"><button onclick="setAnswer('+i+','+oi+')" title="Mark correct" style="width:26px;height:26px;border-radius:50%;flex:none;cursor:pointer;border:2px solid '+(on?'#2d6a56':'#cbd5d0')+';background:'+(on?'#2d6a56':'#fff')+';color:#fff;font-weight:700">'+(on?'✓':'')+'</button>'
        +'<input style="flex:1" value="'+esc(o)+'" placeholder="Answer option" onchange="DATA.quizzes['+i+'].options['+oi+']=this.value">'
        +'<button class="btn danger s" title="Remove answer" onclick="delOption('+i+','+oi+')">✕</button></div>';
    });
    h+='<button class="btn ghost s" onclick="addOption('+i+')">+ Add answer</button>'
      +'<label>Explanation (shown after they answer)</label><textarea style="min-height:48px" onchange="DATA.quizzes['+i+'].explain=this.value" placeholder="Why the correct answer is right.">'+esc(q.explain||"")+'</textarea></div>';
  });
  if(!DATA.quizzes.length)h+='<div class="card muted">No questions yet — click "+ Add question".</div>';
  el.innerHTML=h;
}
function addQuestion(){var t=DATA.quizzes.length?DATA.quizzes[DATA.quizzes.length-1].topic:"General";DATA.quizzes.push({id:"q_"+Date.now(),topic:t,q:"",options:["","",""],answer:0,xp:20,explain:""});renderQuizzes();window.scrollTo(0,document.body.scrollHeight);}
function delQ(i){if(confirm("Delete this question?")){DATA.quizzes.splice(i,1);renderQuizzes();}}
function moveQ(i,d){var ni=i+d;if(ni<0||ni>=DATA.quizzes.length)return;var x=DATA.quizzes.splice(i,1)[0];DATA.quizzes.splice(ni,0,x);renderQuizzes();}
function setAnswer(i,oi){DATA.quizzes[i].answer=oi;renderQuizzes();}
function addOption(i){DATA.quizzes[i].options.push("");renderQuizzes();}
function delOption(i,oi){var q=DATA.quizzes[i];if((q.options||[]).length<=2){toast("Keep at least 2 answers");return;}q.options.splice(oi,1);if(q.answer>=q.options.length)q.answer=q.options.length-1;else if(q.answer>oi)q.answer--;renderQuizzes();}
async function saveQuizzes(){var r=await api("/save",{method:"POST",body:JSON.stringify({what:"quizzes",value:{questions:DATA.quizzes}})});toast(r.ok?"Quizzes published":"Save failed");}

// ---------- ROLEPLAY (visual builder) ----------
function renderRoleplay(){
  var el=document.getElementById("s-roleplay");
  var h='<div class="row" style="justify-content:space-between"><h2>Roleplay scenarios</h2><div class="row"><button class="btn ghost" onclick="addScenario()">+ Add scenario</button><button class="btn" onclick="saveRoleplay()">Save & publish</button></div></div>'
    +'<p class="muted">'+DATA.roleplay.length+' scenarios. Write what the client says, add responses, and mark the best one. Every response needs coaching feedback.</p>';
  DATA.roleplay.forEach(function(s,i){
    h+='<div class="card"><div class="row" style="justify-content:space-between;gap:8px">'
      +'<input style="flex:1" value="'+esc(s.category)+'" placeholder="Category (e.g. Inbound calls)" onchange="DATA.roleplay['+i+'].category=this.value">'
      +'<div class="row"><span class="muted" style="font-size:11px">'+esc(s.id)+'</span><button class="btn ghost s" title="Move up" onclick="moveS('+i+',-1)">↑</button><button class="btn ghost s" title="Move down" onclick="moveS('+i+',1)">↓</button><button class="btn danger s" title="Delete" onclick="delS('+i+')">✕</button></div></div>'
      +'<label>Client says</label><textarea style="min-height:48px" onchange="DATA.roleplay['+i+'].client=this.value" placeholder="The objection or line the client opens with.">'+esc(s.client)+'</textarea>'
      +'<label>Responses — mark the best one</label>';
    (s.options||[]).forEach(function(o,oi){
      var best=(+o.score>=100);
      h+='<div class="card" style="background:#f7faf8;padding:10px;margin:6px 0;border-left:4px solid '+(best?'#2d6a56':'#e0d8c8')+'">'
        +'<div class="row" style="justify-content:space-between"><button onclick="setBest('+i+','+oi+')" class="btn s'+(best?'':' ghost')+'" style="'+(best?'background:#2d6a56;color:#fff':'')+'">'+(best?'✓ Best answer':'Mark as best')+'</button><button class="btn danger s" title="Remove response" onclick="delRpOption('+i+','+oi+')">✕</button></div>'
        +'<label>Response</label><textarea style="min-height:44px" onchange="DATA.roleplay['+i+'].options['+oi+'].text=this.value" placeholder="What the agent says.">'+esc(o.text)+'</textarea>'
        +'<label>Coaching feedback</label><textarea style="min-height:44px" onchange="DATA.roleplay['+i+'].options['+oi+'].feedback=this.value" placeholder="Why this response is good or bad.">'+esc(o.feedback||"")+'</textarea></div>';
    });
    h+='<button class="btn ghost s" onclick="addRpOption('+i+')">+ Add response</button></div>';
  });
  if(!DATA.roleplay.length)h+='<div class="card muted">No scenarios yet — click "+ Add scenario".</div>';
  el.innerHTML=h;
}
function addScenario(){var c=DATA.roleplay.length?DATA.roleplay[DATA.roleplay.length-1].category:"General";DATA.roleplay.push({id:"rp_"+Date.now(),category:c,client:"",options:[{text:"",score:100,feedback:""},{text:"",score:0,feedback:""}]});renderRoleplay();window.scrollTo(0,document.body.scrollHeight);}
function delS(i){if(confirm("Delete this scenario?")){DATA.roleplay.splice(i,1);renderRoleplay();}}
function moveS(i,d){var ni=i+d;if(ni<0||ni>=DATA.roleplay.length)return;var x=DATA.roleplay.splice(i,1)[0];DATA.roleplay.splice(ni,0,x);renderRoleplay();}
function setBest(i,oi){DATA.roleplay[i].options.forEach(function(o,k){o.score=(k===oi?100:0);});renderRoleplay();}
function addRpOption(i){DATA.roleplay[i].options.push({text:"",score:0,feedback:""});renderRoleplay();}
function delRpOption(i,oi){var s=DATA.roleplay[i];if((s.options||[]).length<=2){toast("Keep at least 2 responses");return;}s.options.splice(oi,1);if(!s.options.some(function(o){return +o.score>=100;}))s.options[0].score=100;renderRoleplay();}
async function saveRoleplay(){var r=await api("/save",{method:"POST",body:JSON.stringify({what:"roleplay",value:{scenarios:DATA.roleplay}})});toast(r.ok?"Roleplay published":"Save failed");}
</script>
