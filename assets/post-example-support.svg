<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" font-family="'DM Sans',Segoe UI,sans-serif">
  <rect width="640" height="640" fill="#C9D4C2"/>
  <text x="320" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="26" font-weight="700" fill="#60584F">Stronger Support</text>
  <text x="320" y="118" text-anchor="middle" font-size="46" font-weight="800" fill="#FFFFFF" letter-spacing="1">BETTER PROTECTION</text>

  <!-- card 1 -->
  <g>
    <rect x="70" y="170" width="500" height="92" rx="10" fill="#fff"/>
    <rect x="70" y="170" width="56" height="92" rx="10" fill="#3fb6a8"/>
    <text x="98" y="228" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">1</text>
    <text x="142" y="200" font-size="16" font-weight="800" fill="#2b2b2b">HIGH-QUALITY LEADS</text>
    <text x="142" y="224" font-size="12.5" fill="#444">Eterna gives agents more than leads — a proven</text>
    <text x="142" y="242" font-size="12.5" fill="#444">CRM and retention workflows.</text>
  </g>
  <!-- card 2 -->
  <g>
    <rect x="70" y="282" width="500" height="92" rx="10" fill="#fff"/>
    <rect x="514" y="282" width="56" height="92" rx="10" fill="#5b8def"/>
    <text x="542" y="340" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">2</text>
    <text x="92" y="312" font-size="16" font-weight="800" fill="#2b2b2b">IN-HOUSE TRAINING</text>
    <text x="92" y="336" font-size="12.5" fill="#444">Intentional training designed by top producers,</text>
    <text x="92" y="354" font-size="12.5" fill="#444">tailored to our agents' needs.</text>
  </g>
  <!-- card 3 -->
  <g>
    <rect x="70" y="394" width="500" height="92" rx="10" fill="#fff"/>
    <rect x="70" y="394" width="56" height="92" rx="10" fill="#3fb6a8"/>
    <text x="98" y="452" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">3</text>
    <text x="142" y="424" font-size="16" font-weight="800" fill="#2b2b2b">HELP FROM RETENTION TEAM</text>
    <text x="142" y="448" font-size="12.5" fill="#444">Incredible support to keep an agent's book</text>
    <text x="142" y="466" font-size="12.5" fill="#444">strong and promises kept.</text>
  </g>

  <!-- logo -->
  <g transform="translate(70,556)">
    <circle cx="16" cy="16" r="15" fill="none" stroke="#667066" stroke-width="3.5"/>
    <circle cx="9" cy="21" r="9" fill="none" stroke="#667066" stroke-width="3.5"/>
    <circle cx="23" cy="21" r="9" fill="none" stroke="#667066" stroke-width="3.5"/>
    <text x="46" y="26" font-weight="700" font-size="24" letter-spacing="4" fill="#667066">ETERNA</text>
  </g>
  <text x="570" y="582" text-anchor="end" font-size="20" font-weight="800" fill="#8a6d2f">LIMITED SPOT AVAILABLE!</text>
</svg>
