<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" font-family="'DM Sans',Segoe UI,sans-serif">
  <rect width="640" height="640" fill="#F2F1EF"/>
  <!-- torn gray band -->
  <path d="M0 110 L60 100 120 118 190 104 260 120 330 102 410 122 490 106 560 120 640 108 L640 470 580 458 520 474 450 460 380 476 300 458 220 474 150 460 80 476 0 462 Z" fill="#8c8c8c"/>
  <!-- logo top -->
  <g transform="translate(250,40)">
    <circle cx="14" cy="12" r="12" fill="none" stroke="#667066" stroke-width="3"/>
    <circle cx="8" cy="16" r="7" fill="none" stroke="#667066" stroke-width="3"/>
    <circle cx="20" cy="16" r="7" fill="none" stroke="#667066" stroke-width="3"/>
    <text x="38" y="20" font-weight="700" font-size="20" letter-spacing="3" fill="#667066">ETERNA</text>
  </g>
  <text x="320" y="205" text-anchor="middle" font-family="Georgia,serif" font-size="34" font-weight="800" fill="#fff">Writing a policy is just</text>
  <text x="320" y="245" text-anchor="middle" font-family="Georgia,serif" font-size="34" font-weight="800" fill="#fff">the beginning.</text>
  <text x="320" y="312" text-anchor="middle" font-size="19" fill="#f3f3f3">Keeping it in force is what builds long-term</text>
  <text x="320" y="340" text-anchor="middle" font-size="19" fill="#f3f3f3">wealth — for both the agent and the family</text>
  <text x="320" y="368" text-anchor="middle" font-size="19" fill="#f3f3f3">they are serving.</text>

  <!-- hiring block -->
  <circle cx="150" cy="540" r="86" fill="#cfd8c9"/>
  <path d="M64 540 a86 86 0 0 1 172 0" fill="none" stroke="#667066" stroke-width="8"/>
  <text x="150" y="546" text-anchor="middle" fill="#6b7466" font-size="12">recruiter photo</text>
  <path d="M270 500 l26 -13 v26 z" fill="#667066"/>
  <text x="306" y="512" font-size="24" font-weight="800" fill="#DE6600">WE ARE HIRING</text>
  <text x="306" y="548" font-size="18" fill="#2b2b2b">proven life insurance</text>
  <text x="306" y="574" font-size="18" fill="#2b2b2b">professionals who want to grow</text>
</svg>
