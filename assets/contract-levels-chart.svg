  <rect x="40"  y="532" width="46" height="28"  rx="4" class="pine2"/><text x="63"  y="524" class="lv">70</text>
  <rect x="99"  y="501" width="46" height="59"  rx="4" class="pine2"/><text x="122" y="493" class="lv">75</text>
