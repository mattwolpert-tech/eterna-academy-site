  <rect x="430" y="74" width="14" height="14" rx="3" class="gold"/><text x="450" y="86" class="ink" font-size="12.5">Agency / team (total hierarchy production, 125–145)</text>

  <line x1="32" y1="560" x2="976" y2="560" stroke="#d7cfbf"/>
