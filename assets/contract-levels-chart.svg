<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'DM Sans',Segoe UI,sans-serif">
  <defs><style>
    .pine{fill:#1a3c34}.pine2{fill:#2d6a56}.gold{fill:#f5c842}.gold2{fill:#b88a1e}.cream{fill:#f6f3ec}
    .ink{fill:#22302c}.mut{fill:#6b7770}.wht{fill:#fff}
    .h{font-family:'Playfair Display',Georgia,serif}.b{font-weight:700}
    .lv{font-size:11px;font-weight:700;fill:#1a3c34;text-anchor:middle}
